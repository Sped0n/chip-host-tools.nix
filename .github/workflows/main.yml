name: main

on:
  push:
    paths:
      - "**/*.nix"
      - "flake.lock"
      - ".github/workflows/main.yml"
  workflow_dispatch:

permissions:
  actions: write
  id-token: write
  contents: read

jobs:
  flake-check:
    name: check (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: &build-matrix
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: macos-latest
            system: aarch64-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Nix
        uses: DeterminateSystems/determinate-nix-action@main
        with:
          extra-conf: &nix-extra-conf |
            lazy-trees = true
            eval-cores = 0
            fallback = true
            builders-use-substitutes = true
            connect-timeout = 5
            http-connections = 64
            max-substitution-jobs = 64
            substituters = https://cache.nixos.org?priority=10 https://install.determinate.systems?priority=60
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= cache.flakehub.com-3:hJuILl5sVK4iKm86JzgdXW12Y2Hwd5G07qKtHTOcDCM=

      - name: Restore caches
        id: nix-cache-restore
        uses: nix-community/cache-nix-action/restore@v7
        with:
          primary-key: check-${{ runner.os }}-${{ matrix.system }}-${{ hashFiles('**/*.nix', 'flake.lock') }}
          restore-prefixes-first-match: check-${{ runner.os }}-${{ matrix.system }}-
          restore-prefixes-all-matches: check-${{ runner.os }}-${{ matrix.system }}-
          paths: &check-cache-paths |
            ~/.cache/nix

      - name: Run flake check
        run: nix flake check -L --keep-going

      - name: Move Determinate runtime state out of cache path
        if: ${{ always() && steps.nix-cache-restore.outputs.hit-primary-key != 'true' }}
        run: &move-determinate-state |
          set -euo pipefail
          temp_dir="/tmp/determinate-state-for-cache"
          sudo rm -rf "$temp_dir"
          if [ -d /nix/var/determinate ]; then
            sudo mv /nix/var/determinate "$temp_dir"
          fi

      - name: Save caches
        if: ${{ always() && steps.nix-cache-restore.outputs.hit-primary-key != 'true' }}
        uses: nix-community/cache-nix-action/save@v7
        with:
          primary-key: ${{ steps.nix-cache-restore.outputs.primary-key }}
          gc-max-store-size-linux: 500M
          gc-max-store-size-macos: 500M
          paths: *check-cache-paths
          purge: true
          purge-prefixes: check-${{ runner.os }}-${{ matrix.system }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: true

      - name: Restore Determinate runtime state
        if: ${{ always() && steps.nix-cache-restore.outputs.hit-primary-key != 'true' }}
        run: &restore-determinate-state |
          set -euo pipefail
          temp_dir="/tmp/determinate-state-for-cache"
          if [ -d "$temp_dir" ]; then
            sudo mkdir -p /nix/var
            sudo rm -rf /nix/var/determinate
            sudo mv "$temp_dir" /nix/var/determinate
          fi

  build:
    name: build (${{ matrix.system }})
    needs: flake-check
    runs-on: ${{ matrix.runner }}
    env:
      CCACHE_DIR: /nix/var/cache/ccache
      GHA_CCACHE_MAX_SIZE: 500M
    strategy:
      fail-fast: false
      matrix:
        include: *build-matrix

    steps:
      - name: Cleanup
        run: |
          echo "::group::Free space before cleanup"
          df -h
          echo "::endgroup::"
          echo "::group::Cleaned Files"
          sudo rm -rfv ${{ runner.os == 'Linux' && '/usr/local/lib/android' || '/Users/runner/Library/Android/sdk' }}
          echo "::endgroup::"
          echo "::group::Free space after cleanup"
          df -h
          echo "::endgroup::"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Nix
        uses: DeterminateSystems/determinate-nix-action@main
        with:
          extra-conf: *nix-extra-conf

      - name: Restore caches
        id: nix-cache-restore
        uses: nix-community/cache-nix-action/restore@v7
        with:
          primary-key: build-${{ runner.os }}-${{ matrix.system }}-${{ hashFiles('**/*.nix', 'flake.lock') }}
          restore-prefixes-first-match: build-${{ runner.os }}-${{ matrix.system }}-
          restore-prefixes-all-matches: build-${{ runner.os }}-${{ matrix.system }}-
          paths: &build-cache-paths |
            ~/.cache/nix
            /nix/var/cache/ccache

      - name: Prepare ccache
        run: |
          set -euo pipefail
          sudo mkdir -m0770 -p "$CCACHE_DIR"
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo chown -R --reference=/nix/store "$CCACHE_DIR"
          else
            nix shell --inputs-from . nixpkgs#coreutils -c sh -c 'sudo chown -R --reference=/nix/store "$CCACHE_DIR"'
          fi
          sudo chmod -R ug+rwX,o-rwx "$CCACHE_DIR"

      - name: Install build tools
        run: nix profile install --inputs-from . nixpkgs#ccache nixpkgs#cachix nixpkgs#dust

      - name: Build packages
        id: build
        run: |
          set -euo pipefail

          paths="$({
            nix build -L --print-out-paths --impure --cores 2 --max-jobs 1 --option extra-sandbox-paths "$CCACHE_DIR" \
              .#packages.${{ matrix.system }}.zap-cli-bin \
              .#packages.${{ matrix.system }}.chip-host-tools
          } | sort -u)"

          {
            echo 'paths<<EOF'
            printf '%s\n' "$paths"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Push built paths to Cachix
        run: |
          set -euo pipefail
          cachix authtoken "${{ secrets.CACHIX_AUTH_TOKEN }}"
          cachix doctor
          printf '%s\n' "${{ steps.build.outputs.paths }}" | xargs -r cachix push sped0n

      - name: Show ccache stats
        if: ${{ always() }}
        run: sudo "$(command -v dust)" "$CCACHE_DIR"

      - name: Move Determinate runtime state out of cache path
        if: ${{ always() && steps.nix-cache-restore.outputs.hit-primary-key != 'true' }}
        run: *move-determinate-state

      - name: Relax ccache permissions for cache save
        if: ${{ always() && steps.nix-cache-restore.outputs.hit-primary-key != 'true' }}
        run: sudo chmod -R a+rX "$CCACHE_DIR"

      - name: Save caches
        if: ${{ always() && steps.nix-cache-restore.outputs.hit-primary-key != 'true' }}
        uses: nix-community/cache-nix-action/save@v7
        with:
          primary-key: ${{ steps.nix-cache-restore.outputs.primary-key }}
          gc-max-store-size-linux: 4G
          gc-max-store-size-macos: 4G
          paths: *build-cache-paths
          purge: true
          purge-prefixes: build-${{ runner.os }}-${{ matrix.system }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: true

      - name: Restore Determinate runtime state
        if: ${{ always() && steps.nix-cache-restore.outputs.hit-primary-key != 'true' }}
        run: *restore-determinate-state
