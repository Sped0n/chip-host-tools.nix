name: main

on:
  push:
    paths:
      - "**/*.nix"
      - "flake.lock"
      - ".github/workflows/main.yml"
  workflow_dispatch:

permissions:
  actions: write
  id-token: write
  contents: read

jobs:
  flake-check:
    name: check (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: &build-matrix
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: macos-latest
            system: aarch64-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cleanup
        run: &cleanup-disk |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Linux" ]; then
            before_kib="$(df --output=avail / | tail -1)"
          else
            before_kib="$(df -k / | awk 'END { print $4 }')"
          fi

          echo "::group::Free space before cleanup"
          df -h
          echo "::endgroup::"

          echo "::group::Cleaned Files"
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/.ghcup/ghc
          echo "::endgroup::"

          echo "::group::Free space after cleanup"
          df -h
          echo "::endgroup::"

          if [ "$RUNNER_OS" = "Linux" ]; then
            after_kib="$(df --output=avail / | tail -1)"
          else
            after_kib="$(df -k / | awk 'END { print $4 }')"
          fi

          reclaimed_tenths_gib="$(( (after_kib - before_kib) * 10 / 1024 / 1024 ))"
          printf 'Reclaimed: %d.%d GiB\n' \
            "$(( reclaimed_tenths_gib / 10 ))" \
            "$(( reclaimed_tenths_gib % 10 ))"

      - name: Set up Nix
        uses: DeterminateSystems/determinate-nix-action@main
        with:
          extra-conf: &nix-extra-conf |
            lazy-trees = true
            eval-cores = 0
            fallback = true
            builders-use-substitutes = true
            connect-timeout = 5
            http-connections = 64
            max-substitution-jobs = 64
            substituters = https://cache.nixos.org?priority=10 https://install.determinate.systems?priority=60
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= cache.flakehub.com-3:hJuILl5sVK4iKm86JzgdXW12Y2Hwd5G07qKtHTOcDCM=

      - name: Restore ~/.cache/nix
        id: nix-dotcache-restore
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/nix
          key: nix-dotcache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock') }}

      - name: Restore caches
        id: nix-cache-restore
        uses: nix-community/cache-nix-action/restore@v7
        with:
          primary-key: nix-store-check-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-store-check-${{ runner.os }}-${{ runner.arch }}-
          restore-prefixes-all-matches: nix-store-check-${{ runner.os }}-${{ runner.arch }}-

      - name: Run flake check
        run: nix flake check -L --keep-going

      - name: Move Determinate runtime state out of cache path
        if: ${{ always() && steps.nix-cache-restore.outputs.hit-primary-key != 'true' }}
        run: &move-determinate-state |
          set -euo pipefail
          temp_dir="/tmp/determinate-state-for-cache"
          sudo rm -rf "$temp_dir"
          if [ -d /nix/var/determinate ]; then
            sudo mv /nix/var/determinate "$temp_dir"
          fi

      - name: Save ~/.cache/nix
        if: ${{ always() && steps.nix-dotcache-restore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/nix
          key: nix-dotcache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock') }}

      - name: Save caches
        if: ${{ always() && steps.nix-cache-restore.outputs.hit-primary-key != 'true' }}
        uses: nix-community/cache-nix-action/save@v7
        with:
          primary-key: ${{ steps.nix-cache-restore.outputs.primary-key }}
          gc-max-store-size-linux: 500M
          gc-max-store-size-macos: 500M
          purge: true
          purge-prefixes: nix-store-check-${{ runner.os }}-${{ runner.arch }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never

      - name: Restore Determinate runtime state
        if: ${{ always() && steps.nix-cache-restore.outputs.hit-primary-key != 'true' }}
        run: &restore-determinate-state |
          set -euo pipefail
          temp_dir="/tmp/determinate-state-for-cache"
          if [ -d "$temp_dir" ]; then
            sudo mkdir -p /nix/var
            sudo rm -rf /nix/var/determinate
            sudo mv "$temp_dir" /nix/var/determinate
          fi

  build:
    name: build (${{ matrix.system }})
    needs: flake-check
    runs-on: ${{ matrix.runner }}
    env:
      CCACHE_DIR: /nix/var/cache/ccache
      CCACHE_MAX_SIZE: 200M
    strategy:
      fail-fast: false
      matrix:
        include: *build-matrix

    steps:
      - name: Cleanup
        run: *cleanup-disk

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Nix
        uses: DeterminateSystems/determinate-nix-action@main
        with:
          extra-conf: *nix-extra-conf

      - name: Restore ~/.cache/nix
        id: nix-dotcache-restore
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/nix
          key: nix-dotcache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock') }}

      - name: Restore caches
        id: nix-cache-restore
        uses: nix-community/cache-nix-action/restore@v7
        with:
          primary-key: nix-store-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-store-build-${{ runner.os }}-${{ runner.arch }}-
          restore-prefixes-all-matches: nix-store-build-${{ runner.os }}-${{ runner.arch }}-
          paths: &build-cache-paths |
            /nix/var/cache/ccache

      - name: Install build tools
        run: nix profile add --inputs-from . nixpkgs#ccache

      - name: Add Nix profile binaries to PATH
        run: echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"

      - name: Prepare ccache
        run: |
          set -euo pipefail
          sudo mkdir -m0770 -p "$CCACHE_DIR"
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo chown -R --reference=/nix/store "$CCACHE_DIR"
          else
            nix shell --inputs-from . nixpkgs#coreutils -c bash -c 'sudo chown -R --reference=/nix/store "$CCACHE_DIR"'
          fi
          sudo chmod -R ug+rwX,o-rwx "$CCACHE_DIR"
          sudo --preserve-env=CCACHE_DIR "$(command -v ccache)" -z

      - name: Build packages
        id: build
        run: |
          set -euo pipefail

          paths="$({
            nix build -L --print-out-paths --cores 2 --max-jobs 1 --option extra-sandbox-paths "$CCACHE_DIR" \
              .#packages.${{ matrix.system }}.zap-cli-bin \
              .#packages.${{ matrix.system }}.chip-host-tools_1_5_0_1 \
              .#packages.${{ matrix.system }}.chip-host-tools_1_5_1_0
          } | sort -u)"

          {
            echo 'paths<<EOF'
            printf '%s\n' "$paths"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Push built paths to nix-cache.sped0n.com
        env:
          NIX_CACHE_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_SECRET_ACCESS_KEY }}
          NIX_CACHE_SIGNING_KEY: ${{ secrets.NIX_CACHE_SIGNING_KEY }}
        run: |
          set -euo pipefail

          signing_key_file="$RUNNER_TEMP/nix-cache-signing-key"
          secret_key_file="$RUNNER_TEMP/nix-cache-secret-access-key"

          cleanup() {
            rm -f "$signing_key_file" "$secret_key_file"
          }
          trap cleanup EXIT

          printf '%s' "$NIX_CACHE_SIGNING_KEY" > "$signing_key_file"
          chmod 600 "$signing_key_file"

          printf '%s' "$NIX_CACHE_SECRET_ACCESS_KEY" > "$secret_key_file"
          chmod 600 "$secret_key_file"

          nix profile add github:Sped0n/nix-cache-push

          nix-cache-push config set endpoint nix-cache.sped0n.com
          nix-cache-push config set bucket nix-cache
          nix-cache-push config set region us-east-1
          nix-cache-push config set accessKeyId writer
          nix-cache-push config set signingKeyPath "$signing_key_file"
          nix-cache-push config set secretKeyPath "$secret_key_file"

          printf '%s\n' "${{ steps.build.outputs.paths }}" \
            | nix-cache-push

      - name: Show ccache stats
        if: ${{ always() }}
        run: |
          set -euo pipefail
          sudo --preserve-env=CCACHE_DIR,CCACHE_MAX_SIZE "$(command -v ccache)" -M "$CCACHE_MAX_SIZE"
          sudo --preserve-env=CCACHE_DIR "$(command -v ccache)" -c
          sudo --preserve-env=CCACHE_DIR "$(command -v ccache)" -svv

      - name: Move Determinate runtime state out of cache path
        if: ${{ always() && steps.nix-cache-restore.outputs.hit-primary-key != 'true' }}
        run: *move-determinate-state

      - name: Relax ccache permissions for cache save
        if: ${{ always() && steps.nix-cache-restore.outputs.hit-primary-key != 'true' }}
        run: sudo chmod -R a+rX "$CCACHE_DIR"

      - name: Save ~/.cache/nix
        if: ${{ always() && steps.nix-dotcache-restore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/nix
          key: nix-dotcache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock') }}

      - name: Save caches
        if: ${{ always() && steps.nix-cache-restore.outputs.hit-primary-key != 'true' }}
        uses: nix-community/cache-nix-action/save@v7
        with:
          primary-key: ${{ steps.nix-cache-restore.outputs.primary-key }}
          gc-max-store-size-linux: 4G
          gc-max-store-size-macos: 4G
          paths: *build-cache-paths
          purge: true
          purge-prefixes: nix-store-build-${{ runner.os }}-${{ runner.arch }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never

      - name: Restore Determinate runtime state
        if: ${{ always() && steps.nix-cache-restore.outputs.hit-primary-key != 'true' }}
        run: *restore-determinate-state
